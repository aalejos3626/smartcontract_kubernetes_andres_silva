apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-contract-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: smart-contract
  template:
    metadata:
      labels:
        app: smart-contract
    spec:
      containers:
      - name: contract-container
        image: trufflesuite/ganache-cli:latest
        ports:
        - containerPort: 8545
---
apiVersion: v1
kind: Service
metadata:
  name: smart-contract-service
spec:
  selector:
    app: smart-contract
  ports:
    - protocol: TCP
      port: 8545
      targetPort: 8545
  type: ClusterIP