apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-contract-deployment
  labels:
    app: blockchain-node
    author: andres-silva
spec:
  replicas: 3
  selector:
    matchLabels:
      app: blockchain-node
  template:
    metadata:
      labels:
        app: blockchain-node
    spec:
      containers:
      - name: node-container
        image: trufflesuite/ganache-cli:latest
        ports:
        - containerPort: 8545
---
apiVersion: v1
kind: Service
metadata:
  name: blockchain-contract-service
spec:
  selector:
    app: blockchain-node
  ports:
    - protocol: TCP
      port: 8545
      targetPort: 8545
  type: ClusterIP
